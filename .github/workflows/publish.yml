name: Publish

# Publishes @max-network/css to GitHub Packages when a GitHub Release is published
# (or via manual dispatch). Uses the workflow GITHUB_TOKEN with packages:write.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@max-network"
      - run: npm install
      - run: npm run check
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
