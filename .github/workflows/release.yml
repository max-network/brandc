name: Release and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install

      - name: Determine next version
        id: version
        run: |
          NEXT=$(node -e "const cp=require('child_process');const pkg=require('./package.json').version;let npmv='0.0.0';try{npmv=cp.execSync('npm view brandc version',{stdio:['ignore','pipe','ignore']}).toString().trim()||'0.0.0'}catch(e){}const gt=(x,y)=>{const A=x.split('.').map(Number),B=y.split('.').map(Number);for(let i=0;i<3;i++){if(A[i]>B[i])return true;if(A[i]<B[i])return false}return false};const [a,b,c]=npmv.split('.').map(Number);console.log(gt(pkg,npmv)?pkg:[a,b,c+1].join('.'))")
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "brandc release version: $NEXT" >> "$GITHUB_STEP_SUMMARY"

      - name: Stamp changelog
        run: node scripts/changelog-release.mjs "${{ steps.version.outputs.next }}"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.next }}" --no-git-tag-version --allow-same-version

      - name: Check
        run: npm run check

      - name: Commit and tag
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release v$NEXT" || echo "nothing to commit"
          git tag "v$NEXT"
          git push origin main --tags

      - name: Publish to npm
        run: npx npm@latest publish --provenance --access public

      - name: GitHub Release
        run: gh release create "v${{ steps.version.outputs.next }}" --title "v${{ steps.version.outputs.next }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
